<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" id="metaTheme" content="#141414">
<title>MOONERA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--g1:#4ade80;--g2:#16a34a;--grad:linear-gradient(135deg,#4ade80,#22c55e,#16a34a);--gbtn:linear-gradient(135deg,#4ade80,#16a34a);--rc:20px;--rb:50px;--tr:0.3s cubic-bezier(0.4,0,0.2,1)}
[data-theme="dark"]{--bg:#141414;--bg3:#2a2a2a;--sf:#1e1e1e;--sf2:#2a2a2a;--bd:rgba(255,255,255,0.07);--tx:#f0f0f0;--tx2:#a0a0a0;--ov:rgba(20,20,20,0.95)}
[data-theme="light"]{--bg:#f5f5f3;--bg3:#e0e0de;--sf:#ffffff;--sf2:#f0f0ee;--bd:rgba(0,0,0,0.08);--tx:#111111;--tx2:#666666;--ov:rgba(245,245,243,0.97)}
html{background-color:#141414}
html[data-theme="light"]{background-color:#f5f5f3}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden;transition:background var(--tr),color var(--tr)}
.hdr{position:sticky;top:0;z-index:100;background:var(--ov);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-img{width:36px;height:36px;border-radius:10px;background:var(--gbtn);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff;overflow:hidden}
.logo-img img{width:100%;height:100%;object-fit:cover}
.logo-txt{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-r{display:flex;gap:8px;align-items:center}
.ibtn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:var(--tr);color:var(--tx);position:relative}
.notif-dot{position:absolute;top:0;right:0;width:10px;height:10px;border-radius:50%;background:#ef4444;border:2px solid var(--bg);display:none}
.notif-dot.on{display:block}
.ord-btn{width:40px;height:40px;border-radius:50%;background:var(--gbtn);border:none;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(74,222,128,0.4);animation:pg 2s infinite}
.ord-btn.on{display:flex}
@keyframes pg{0%,100%{box-shadow:0 4px 12px rgba(74,222,128,0.4)}50%{box-shadow:0 4px 22px rgba(74,222,128,0.75)}}
.cart-fab{position:fixed;bottom:24px;right:20px;z-index:150;width:56px;height:56px;border-radius:50%;background:var(--gbtn);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 6px 24px rgba(74,222,128,0.5);transition:var(--tr)}
.cbadge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:10px;font-weight:700;width:20px;height:20px;border-radius:50%;display:none;align-items:center;justify-content:center;border:2px solid var(--bg)}
.cbadge.on{display:flex}
.page{display:none;padding-bottom:100px}
.page.on{display:block}
.hero{margin:16px;border-radius:var(--rc);background:var(--gbtn);padding:28px 24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.12)}
.htag{display:inline-block;background:rgba(255,255,255,0.2);color:#fff;font-size:11px;font-weight:600;padding:4px 12px;border-radius:50px;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.hero h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:8px;position:relative;z-index:1}
.hero p{color:rgba(255,255,255,0.85);font-size:13px;position:relative;z-index:1}
.sec-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin:20px 16px 12px;color:var(--tx)}
.cats{display:flex;gap:8px;padding:0 16px;overflow-x:auto;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 18px;border-radius:50px;border:1.5px solid var(--bd);background:var(--sf);color:var(--tx2);font-size:13px;font-weight:500;cursor:pointer;transition:var(--tr);white-space:nowrap}
.chip.on{background:var(--gbtn);border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(74,222,128,0.3)}
.bwrap{padding:0 16px;display:flex;flex-direction:column;gap:12px;margin:20px 0 4px}
.bitem{border-radius:var(--rc);padding:20px;position:relative;overflow:hidden;cursor:pointer;transition:var(--tr)}
.bitem:active{transform:scale(0.98)}
/* PRODUCT GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;margin-top:16px}
.pcard{background:var(--sf);border-radius:var(--rc);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.15);border:1px solid var(--bd);cursor:pointer;transition:var(--tr)}
.pcard:active{transform:scale(0.97)}
.pimg{width:100%;aspect-ratio:4/5;background:var(--bg3);position:relative;overflow:hidden}
.pimg-track{display:flex;width:100%;height:100%}
.pimg-slide{min-width:100%;height:100%;flex-shrink:0;overflow:hidden}
.pimg-slide img{width:100%;height:100%;object-fit:cover;object-position:center center;display:block}
.pimg-slide-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:44px;opacity:0.3}
.pbadge{position:absolute;top:8px;left:8px;background:var(--gbtn);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px;text-transform:uppercase;z-index:3;pointer-events:none}
.pimg-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:3;pointer-events:none}
.pimg-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.5);transition:var(--tr)}
.pimg-dot.on{background:#fff;width:14px;border-radius:3px}
.parr{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.42);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;z-index:4;line-height:1}
.parr-l{left:6px}.parr-r{right:6px}
.heart-btn{position:absolute;top:8px;right:8px;z-index:4;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.35);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px}
.pinfo{padding:12px}
.pname{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--tx);margin-bottom:4px;line-height:1.3}
.pcat{font-size:11px;color:var(--tx2);margin-bottom:8px}
.pbot{display:flex;align-items:center;justify-content:space-between}
.pprice{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.abtn{width:30px;height:30px;border-radius:50%;background:var(--gbtn);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;box-shadow:0 3px 10px rgba(74,222,128,0.4);line-height:1}
.cctr{display:flex;align-items:center;gap:6px}
.ccbtn{width:30px;height:30px;border-radius:50%;background:var(--gbtn);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;line-height:1}
.ccnum{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;min-width:16px;text-align:center;color:var(--tx)}
/* SHEET */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;opacity:0;pointer-events:none;transition:opacity var(--tr);backdrop-filter:blur(6px)}
.ov.on{opacity:1;pointer-events:all}
.sh{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-radius:24px 24px 0 0;z-index:201;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);max-height:92vh;display:flex;flex-direction:column}
.sh.on{transform:translateY(0)}
.shandle{width:40px;height:4px;background:var(--bd);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.shhdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--bd);flex-shrink:0}
.shtitle{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.shclose{width:32px;height:32px;border-radius:50%;background:var(--sf2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--tx)}
.shbody{overflow-y:auto;flex:1;scrollbar-width:none}
.shbody::-webkit-scrollbar{display:none}
/* DETAIL */
.det-body{padding:16px 20px 0}
.det-img-box{width:100%;aspect-ratio:4/5;border-radius:16px;overflow:hidden;background:var(--bg3);position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.det-img-box img{width:100%;height:100%;object-fit:cover;object-position:center top}
.det-img-ph{font-size:60px;opacity:0.35}
.det-arr{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.45);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;z-index:4;line-height:1}
.det-arr-l{left:8px}.det-arr-r{right:8px}
.det-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:3;pointer-events:none}
.det-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.5);transition:var(--tr)}
.det-dot.on{background:#fff;width:14px;border-radius:3px}
.det-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
.det-price{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.det-cat{font-size:12px;color:var(--tx2)}
.det-desc{font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:16px}
.plabel{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:10px}
.sch{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.sc{min-width:44px;height:44px;padding:0 10px;border-radius:12px;border:1.5px solid var(--bd);background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr);color:var(--tx)}
.sc.on{background:var(--gbtn);border-color:transparent;color:#fff}
.cch{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
.cc{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:var(--tr);flex-shrink:0;position:relative}
.cc.on{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--tx)}
.cc .cc-tip{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--tx2);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.2s}
.cc.on .cc-tip{opacity:1}
.gbtnf{width:100%;padding:16px;border-radius:var(--rb);background:var(--gbtn);border:none;color:#fff;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(74,222,128,0.4);transition:var(--tr);margin-bottom:40px}
/* CART */
.citems{flex:1;overflow-y:auto;padding:12px 20px;scrollbar-width:none}
.citems::-webkit-scrollbar{display:none}
.cempty{text-align:center;padding:40px 20px;color:var(--tx2);font-size:14px}
.ci{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd)}
.ci-img{width:60px;height:70px;border-radius:14px;background:var(--bg3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px}
.ci-img img{width:100%;height:100%;object-fit:cover}
.ci-info{flex:1}
.ci-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:2px}
.ci-size{font-size:11px;color:var(--tx2);margin-bottom:6px}
.qctrl{display:flex;align-items:center;gap:10px}
.qbtn{width:26px;height:26px;border-radius:50%;background:var(--sf2);border:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--tx);line-height:1}
.qnum{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;min-width:20px;text-align:center}
.ci-price{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0}
.cfooter{padding:16px 20px 0;flex-shrink:0}
.ctrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.ctlabel{font-size:14px;color:var(--tx2)}
.ctval{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
/* ORDER */
.oscroll{overflow-y:auto;flex:1;scrollbar-width:none;padding-bottom:40px}
.oscroll::-webkit-scrollbar{display:none}
.fg{padding:0 20px;margin-bottom:14px}
.fl{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;display:block}
.fi{width:100%;padding:14px 16px;border-radius:16px;border:1.5px solid var(--bd);background:var(--sf2);color:var(--tx);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color var(--tr)}
.fi:focus{border-color:var(--g1)}
.fi::placeholder{color:var(--tx2)}
.fi.err{border-color:#ef4444}
.sbtn{width:calc(100% - 40px);margin:8px 20px 0;padding:16px;border-radius:var(--rb);background:var(--gbtn);border:none;color:#fff;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer}
.succ{display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.succ.on{display:flex}
.succ-icon{width:80px;height:80px;border-radius:50%;background:var(--gbtn);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:20px}
.succ-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:8px}
.succ-sub{font-size:14px;color:var(--tx2);line-height:1.6;margin-bottom:24px}
.succ-btn{padding:14px 40px;border-radius:var(--rb);background:var(--gbtn);border:none;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
/* STATUS */
.osteps{padding:16px 20px}
.ostep{display:flex;gap:14px;align-items:flex-start;padding:12px 0;position:relative}
.ostep:not(:last-child)::after{content:'';position:absolute;left:19px;top:44px;width:2px;height:calc(100% - 12px);background:var(--bd)}
.ostep.done::after,.ostep.active::after{background:var(--g1)}
.sico{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:2px solid var(--bd);background:var(--sf2);position:relative;z-index:1}
.ostep.done .sico{background:var(--gbtn);border-color:transparent}
.ostep.active .sico{border-color:var(--g1);box-shadow:0 0 0 4px rgba(74,222,128,0.15);animation:pg 2s infinite}
.ostep.pend .sico{opacity:0.3}
.ostep.pend .stitle{color:var(--tx2)}
.sinfo{flex:1;padding-top:6px}
.stitle{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:2px}
.ssub{font-size:12px;color:var(--tx2)}
/* REVIEW */
.revsec{margin:0 20px 24px;background:var(--sf2);border-radius:18px;padding:16px;border:1px solid var(--bd)}
.stars{display:flex;gap:8px;margin-bottom:12px}
.star{font-size:30px;cursor:pointer;filter:grayscale(1);line-height:1}
.star.on{filter:none}
.revta{width:100%;padding:12px 14px;border-radius:14px;border:1.5px solid var(--bd);background:var(--sf);color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;outline:none;resize:none;min-height:80px;margin-bottom:12px;display:block}
/* PROFILE */
.prof-header{display:flex;flex-direction:column;align-items:center;padding:28px 20px 20px;border-bottom:1px solid var(--bd)}
.prof-avatar-wrap{position:relative;cursor:pointer;margin-bottom:12px}
.prof-avatar-wrap input{position:absolute;inset:0;opacity:0;cursor:pointer;border-radius:50%}
.prof-avatar{width:80px;height:80px;border-radius:50%;background:var(--gbtn);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:32px;color:#fff;overflow:hidden}
.prof-avatar img{width:100%;height:100%;object-fit:cover}
.prof-avatar-edit{position:absolute;bottom:0;right:0;width:24px;height:24px;border-radius:50%;background:var(--gbtn);display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid var(--bg)}
.prof-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:2px}
.prof-phone{font-size:13px;color:var(--tx2)}
.pmenu-item{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--bd);cursor:pointer;transition:var(--tr)}
.pmenu-item:active{background:var(--sf2)}
.pmenu-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative}
.pmenu-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.pmenu-sub{font-size:12px;color:var(--tx2)}
.prof-section{padding:16px 16px 0}
.prof-empty{text-align:center;padding:24px;color:var(--tx2);font-size:13px}
.prof-order-card{background:var(--sf);border-radius:16px;padding:14px;border:1px solid var(--bd);margin-bottom:10px;cursor:pointer}
.prof-order-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prof-order-id{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.stat-badge{padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;text-transform:uppercase}
.stat-proc{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)}
.stat-ship{background:rgba(99,102,241,0.15);color:#818cf8;border:1px solid rgba(99,102,241,0.3)}
.stat-done{background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.3)}
.stat-cancel{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)}
.prof-fav-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fav-card{background:var(--sf);border-radius:14px;overflow:hidden;border:1px solid var(--bd);cursor:pointer}
.fav-img{width:100%;aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.fav-img img{width:100%;height:100%;object-fit:cover}
.fav-name{font-size:11px;font-weight:600;padding:6px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-price{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;padding:0 8px 4px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.my-rev-card{background:var(--sf);border-radius:16px;padding:14px;border:1px solid var(--bd);margin-bottom:10px}
.sup-msg{font-size:13px;line-height:1.6;padding:10px 14px;border-radius:12px;margin-bottom:4px;max-width:80%;display:inline-block;word-break:break-word}
.sup-msg.user{background:var(--gbtn);color:#fff;border-bottom-right-radius:4px;float:right;clear:both}
.sup-msg.admin{background:var(--sf2);color:var(--tx);border-bottom-left-radius:4px;float:left;clear:both}
.sup-time{font-size:10px;color:var(--tx2);margin-bottom:8px;clear:both}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gbtn);color:#fff;padding:12px 24px;border-radius:50px;font-size:13px;font-weight:600;z-index:999;opacity:0;pointer-events:none;transition:all 0.3s;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header class="hdr">
  <div class="logo">
    <div class="logo-img" id="logoImg">M</div>
    <span class="logo-txt" id="logoTxt">MOONERA</span>
  </div>
  <div class="hdr-r">

<script>
// ===== FIREBASE =====
const FB_CFG = {

// ===== CONSTANTS =====
const STEPS=[

const PD=[
  {id:1,name:'Essential Tee',cat:'Футболки',price:189000,emoji:'👕',badge:'Хит',desc:'Базовая футболка 100% хлопок.',order:0},
  {id:2,name:'MOONERA Hoodie',cat:'Худи',price:459000,emoji:'🧥',badge:'Новинка',desc:'Флисовый хлопок.',order:1},
  {id:3,name:'Cargo Pants',cat:'Брюки',price:389000,emoji:'👖',badge:'',desc:'6 карманов.',order:2},

];

// ===== STATE =====

// Firebase cache

// ===== CLIENT ID — unique per browser =====
function getClientId(){
  let id=localStorage.getItem('moonera_client_id');
  if(!id){id='client_'+Date.now()+'_'+Math.random().toString(36).slice(2);localStorage.setItem('moonera_client_id',id);}

// ===== FIREBASE LOAD =====
async function loadFromFirebase(){
  try {
    // Products
    const pSnap=await db.collection('products').orderBy('order').get();
    if(!pSnap.empty) _products=pSnap.docs.map(d=>({...d.data(),id:d.data().id||d.id}));

    // Settings
    const sSnap=await db.collection('settings').get();
    sSnap.docs.forEach(d=>{_settings[d.id]={...d.data()};});

    applySettings();
    renderCats();renderBanners();renderProds();

    // Realtime order status
    startOrderListener();
    startSupportListener();
  } catch(e){
    console.warn('Firebase error:',e);
    renderCats();renderBanners();renderProds();
  }
}

function applySettings(){
  const vis=_settings.visuals||{};
  if(vis.logo){const li=document.getElementById('logoImg');li.innerHTML=`<img src="${vis.logo}">`;}
  if(vis.banner){
    const b=vis.banner,h=document.getElementById('heroBanner');
    if(b.color1&&b.color2)h.style.background=`linear-gradient(135deg,${b.color1},${b.color2})`;
    if(b.tag)document.getElementById('heroTag').textContent=b.tag;
    if(b.title1||b.title2)document.getElementById('heroTitle').innerHTML=(b.title1||'')+'<br>'+(b.title2||'');
    if(b.sub)document.getElementById('heroSub').textContent=b.sub;
  }
  if(vis.logoColor){
    const lc=vis.logoColor,t=document.getElementById('logoTxt');
    if(lc.type==='gradient'){t.style.background=`linear-gradient(135deg,${lc.color1},${lc.color2})`;t.style.webkitBackgroundClip='text';t.style.webkitTextFillColor='transparent';t.style.backgroundClip='text';}
    else{t.style.background='none';t.style.webkitTextFillColor=lc.solid;t.style.color=lc.solid;}
  }
}

function startOrderListener(){
  if(_orderUnsub)_orderUnsub();
  const myId=localStorage.getItem('moonera_my_order_id');
  if(!myId)return;
  _orderUnsub=db.collection('orders').doc(myId).onSnapshot(snap=>{
    if(!snap.exists)return;
    const order={id:snap.id,...snap.data()};
    localStorage.setItem('moonera_order_cache_'+myId,JSON.stringify(order));
    const prev=localStorage.getItem('moonera_prev_'+myId);
    if(order.status!==prev){
      localStorage.setItem('moonera_prev_'+myId,order.status);
      chkOrdBtn();
      if(order.status==='Выполнен'&&prev&&prev!=='Выполнен')openStatus();
    }
  });
}

function startSupportListener(){
  if(_supUnsub)_supUnsub();
  const clientId=getClientId();
  _supUnsub=db.collection('support').where('clientId','==',clientId)
    .onSnapshot(snap=>{
      const msgs=snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>a.date>b.date?1:-1);
      localStorage.setItem('moonera_support_msgs',JSON.stringify(msgs));
      chkSupportNotif();
    });
}

// ===== DATA GETTERS =====
function gP(){return _products||PD;}
function gCats(){return (_settings.cats&&_settings.cats.value)||[...CATD];}
function gSizes(){return (_settings.sizes&&_settings.sizes.value)||[...SD];}
function gColors(){return (_settings.colors&&_settings.colors.value)||[...CD];}
function gBans(){return (_settings.banners&&_settings.banners.value)||[...BAND];}
function gFavs(){return JSON.parse(localStorage.getItem('moonera_favs')||'[]');}
function svFavs(f){localStorage.setItem('moonera_favs',JSON.stringify(f));}
function gProfile(){return JSON.parse(localStorage.getItem('moonera_profile')||'null');}
function svProfile(p){localStorage.setItem('moonera_profile',JSON.stringify(p));}
function getMyOrder(){
  const id=localStorage.getItem('moonera_my_order_id');
  if(!id)return null;
  const cached=localStorage.getItem('moonera_order_cache_'+id);
  return cached?JSON.parse(cached):null;
}
function fmt(p){return Number(p).toLocaleString('ru-RU')+' сум';}

// ===== THEME =====
function toggleTheme(){
  const h=document.documentElement,isDark=h.dataset.theme==='dark';
  const t=isDark?'light':'dark';
  h.dataset.theme=t;
  h.style.backgroundColor=isDark?'#f5f5f3':'#141414';
  document.body.style.backgroundColor=isDark?'#f5f5f3':'#141414';
  document.body.style.color=isDark?'#111111':'#f0f0f0';
  document.getElementById('themeBtn').textContent=isDark?'☀️':'🌙';
  document.getElementById('metaTheme').content=isDark?'#f5f5f3':'#141414';
  localStorage.setItem('moonera_theme',t);
}

// ===== NAV =====
function openProfile(){document.getElementById('page-shop').classList.remove('on');document.getElementById('page-profile').classList.add('on');showProfilePage();}
function goShop(){document.getElementById('page-profile').classList.remove('on');document.getElementById('page-shop').classList.add('on');}

// ===== CATS =====
function renderCats(){
  const cats=gCats();
  document.getElementById('catsEl').innerHTML=
    `<div class="chip ${curCat==='all'?'on':''}" onclick="fCat('all',this)">Все</div>`
    +cats.map(c=>`<div class="chip ${curCat===c?'on':''}" onclick="fCat('${c}',this)">${c}</div>`).join('');
}
function fCat(cat,el){
  curCat=cat;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));if(el)el.classList.add('on');
  document.getElementById('prodTitle').textContent=cat==='all'?'Все товары':cat;
  const be=document.getElementById('bannersEl');if(be)be.style.display=cat==='all'?'block':'none';

// ===== BANNERS =====
function renderBanners(){
  const bans=gBans(),el=document.getElementById('bannersEl');
  if(!bans.length){el.innerHTML='';return;}
  el.innerHTML='<div class="bwrap">'+bans.map(b=>`
    <div class="bitem" style="background:linear-gradient(135deg,${b.color1},${b.color2})" onclick="fBan('${b.cat}')">
      <div style="display:inline-block;background:rgba(255,255,255,0.2);color:#fff;font-size:10px;font-weight:600;padding:3px 10px;border-radius:50px;margin-bottom:8px">${b.tag}</div>
      <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;margin-bottom:4px">${b.title}</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:12px">${b.sub}</div>
      <div style="display:inline-flex;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:12px;font-weight:600;padding:6px 14px;border-radius:50px">Смотреть →</div>
    </div>`).join('')+'</div>';
}
function fBan(cat){curCat=cat;document.getElementById('prodTitle').textContent=cat;document.getElementById('bannersEl').style.display='none';document.querySelectorAll('.chip').forEach(c=>{c.classList.remove('on');if(c.textContent===cat)c.classList.add('on');});renderProds();}

// ===== PRODUCTS =====
function renderProds(){
  const all=gP().sort((a,b)=>(a.order??99)-(b.order??99));
  const list=curCat==='all'?all:all.filter(p=>p.cat===curCat);
  const favs=gFavs();
  const g=document.getElementById('gridEl');
  if(!list.length){g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--tx2)">Товаров нет</div>';return;}
  g.innerHTML=list.map(p=>{
    const qty=cart.filter(i=>i.id===p.id).reduce((s,i)=>s+i.qty,0);
    const isFav=favs.includes(p.id);
    const imgs=p.images&&p.images.length?p.images:(p.image?[p.image]:[]);
    const ctrl=qty>0
      ?`<div class="cctr"><button class="ccbtn" onclick="event.stopPropagation();cDec(${p.id})">−</button><div class="ccnum">${qty}</div><button class="ccbtn" onclick="event.stopPropagation();openDet(${p.id})">+</button></div>`
      :`<button class="abtn" onclick="event.stopPropagation();openDet(${p.id})">+</button>`;
    let imgZone;
    if(imgs.length>1){
      imgZone=`<div class="pimg" id="pimg-${p.id}">
        <div class="pimg-track" id="ptrack-${p.id}">
          ${imgs.map(src=>`<div class="pimg-slide"><img src="${src}" alt="${p.name}"></div>`).join('')}
        </div>
        ${p.badge?`<div class="pbadge">${p.badge}</div>`:''}
        <button class="heart-btn" onclick="event.stopPropagation();toggleFav(${p.id})">${isFav?'❤️':'🤍'}</button>
        <button class="parr parr-l" onclick="event.stopPropagation();pArr(${p.id},-1)">‹</button>
        <button class="parr parr-r" onclick="event.stopPropagation();pArr(${p.id},1)">›</button>
        <div class="pimg-dots" id="pdots-${p.id}">${imgs.map((_,i)=>`<div class="pimg-dot ${i===0?'on':''}"></div>`).join('')}</div>
      </div>`;
    } else {
      imgZone=`<div class="pimg" onclick="openDet(${p.id})">
        <div class="pimg-track"><div class="pimg-slide">${imgs.length?`<img src="${imgs[0]}" alt="${p.name}">`:`<div class="pimg-slide-ph">${p.emoji||'👕'}</div>`}</div></div>
        ${p.badge?`<div class="pbadge">${p.badge}</div>`:''}
        <button class="heart-btn" onclick="event.stopPropagation();toggleFav(${p.id})">${isFav?'❤️':'🤍'}</button>
      </div>`;
    }
    return `<div class="pcard" onclick="openDet(${p.id})">${imgZone}
      <div class="pinfo">
        <div class="pname">${p.name}</div><div class="pcat">${p.cat}</div>
        <div class="pbot"><div class="pprice">${fmt(p.price)}</div><div onclick="event.stopPropagation()">${ctrl}</div></div>
      </div></div>`;
  }).join('');
  list.forEach(p=>{
    const imgs=p.images&&p.images.length?p.images:(p.image?[p.image]:[]);
    if(imgs.length>1){cardIdx[p.id]=0;initPSwipe(p.id,imgs.length);}
  });
}

// ===== CAROUSEL =====
function pArr(pid,dir){
  const track=document.getElementById('ptrack-'+pid);
  const dots=document.getElementById('pdots-'+pid);
  if(!track)return;
  const total=track.children.length;
  cardIdx[pid]=Math.max(0,Math.min(total-1,(cardIdx[pid]||0)+dir));
  track.style.transition='transform 0.3s ease';
  track.style.transform=`translateX(-${cardIdx[pid]*100}%)`;
  if(dots)dots.querySelectorAll('.pimg-dot').forEach((d,i)=>d.classList.toggle('on',i===cardIdx[pid]));
}
function initPSwipe(pid,total){
  const box=document.getElementById('pimg-'+pid);
  const track=document.getElementById('ptrack-'+pid);
  const dots=document.getElementById('pdots-'+pid);
  if(!box||!track)return;
  let sx=0,sy=0,moved=false,isH=false;
  function go(n){cardIdx[pid]=Math.max(0,Math.min(total-1,n));track.style.transition='transform 0.3s ease';track.style.transform=`translateX(-${cardIdx[pid]*100}%)`;if(dots)dots.querySelectorAll('.pimg-dot').forEach((d,i)=>d.classList.toggle('on',i===cardIdx[pid]));}
  box.addEventListener('touchstart',e=>{sx=e.changedTouches[0].clientX;sy=e.changedTouches[0].clientY;moved=false;isH=false;track.style.transition='none';},{passive:true});
  box.addEventListener('touchmove',e=>{const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(!moved){isH=Math.abs(dx)>Math.abs(dy);moved=true;}if(isH)track.style.transform=`translateX(calc(-${(cardIdx[pid]||0)*100}% + ${dx}px))`;},{passive:true});
  box.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(isH&&Math.abs(dx)>40){dx<0?go((cardIdx[pid]||0)+1):go((cardIdx[pid]||0)-1);}else{track.style.transition='transform 0.3s ease';track.style.transform=`translateX(-${(cardIdx[pid]||0)*100}%)`;if(Math.abs(dx)<8&&Math.abs(dy)<8)openDet(pid);}},{passive:true});
}

// ===== DETAIL =====
function openDet(id){
  const p=gP().find(x=>String(x.id)===String(id));if(!p)return;
  curProd=id;selSize=null;selColor=null;detIdx=0;
  document.getElementById('detName').textContent=p.name;
  document.getElementById('detPrice').textContent=fmt(p.price);
  document.getElementById('detCat').textContent=p.cat;
  document.getElementById('detDesc').textContent=p.desc||'';
  const imgs=p.images&&p.images.length?p.images:(p.image?[p.image]:[]);
  const box=document.getElementById('detImgBox');
  detTotal=imgs.length;
  if(!imgs.length){
    box.innerHTML=`<div class="det-img-box"><div class="det-img-ph">${p.emoji||'👕'}</div></div>`;
  } else if(imgs.length===1){
    box.innerHTML=`<div class="det-img-box"><img src="${imgs[0]}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;object-position:center top"></div>`;
  } else {
    box.innerHTML=`<div class="det-img-box" id="detImgInner">
      <div id="detTrack" style="display:flex;width:100%;height:100%;transition:transform 0.3s ease">
        ${imgs.map(src=>`<div style="min-width:100%;height:100%;flex-shrink:0"><img src="${src}" style="width:100%;height:100%;object-fit:cover;object-position:center top"></div>`).join('')}
      </div>
      <button class="det-arr det-arr-l" onclick="detGo(-1)">‹</button>
      <button class="det-arr det-arr-r" onclick="detGo(1)">›</button>
      <div class="det-dots" id="detDots">${imgs.map((_,i)=>`<div class="det-dot ${i===0?'on':''}"></div>`).join('')}</div>
    </div>`;
    const inner=document.getElementById('detImgInner');
    let sx=0;
    inner.addEventListener('touchstart',e=>{sx=e.changedTouches[0].clientX;},{passive:true});
    inner.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)detGo(dx<0?1:-1);},{passive:true});
  }
  const sizes=p.sizes&&p.sizes.length?p.sizes:gSizes();
  document.getElementById('detSizes').innerHTML=sizes.map(s=>`<div class="sc" onclick="selS('${s}',this)">${s}</div>`).join('');
  const colors=p.colors&&p.colors.length?p.colors:gColors();
  document.getElementById('detColors').innerHTML=colors.map(c=>`<div class="cc" style="background:${c.hex}" title="${c.name}" onclick="selC('${c.name}',this)"><span class="cc-tip">${c.name}</span></div>`).join('');
  document.getElementById('detOv').classList.add('on');document.getElementById('detSh').classList.add('on');document.body.style.overflow='hidden';
}
function detGo(dir){detIdx=Math.max(0,Math.min(detTotal-1,detIdx+dir));const t=document.getElementById('detTrack');if(t)t.style.transform=`translateX(-${detIdx*100}%)`;const d=document.getElementById('detDots');if(d)d.querySelectorAll('.det-dot').forEach((x,i)=>x.classList.toggle('on',i===detIdx));}
function closeDet(){document.getElementById('detOv').classList.remove('on');document.getElementById('detSh').classList.remove('on');document.body.style.overflow='';}
function selS(s,el){selSize=s;document.querySelectorAll('#detSizes .sc').forEach(c=>c.classList.remove('on'));el.classList.add('on');}
function selC(n,el){selColor=n;document.querySelectorAll('#detColors .cc').forEach(c=>c.classList.remove('on'));el.classList.add('on');}
function addFromDet(){
  if(!selSize){toast('Выбери размер!');return;}if(!selColor){toast('Выбери цвет!');return;}
  const p=gP().find(x=>String(x.id)===String(curProd));if(!p)return;
  const label=`${selSize} · ${selColor}`;
  const ex=cart.find(i=>i.id===p.id&&i.size===label);
  if(ex)ex.qty++;else cart.push({id:p.id,name:p.name,price:p.price,emoji:p.emoji||'👕',image:(p.images&&p.images[0])||p.image||null,size:label,qty:1});
  localStorage.setItem('moonera_cart',JSON.stringify(cart));updCart();closeDet();toast(`${p.name} добавлен ✓`);renderProds();
}
function toggleFav(id){let f=gFavs();const i=f.indexOf(id);if(i>-1)f.splice(i,1);else f.push(id);svFavs(f);renderProds();toast(i>-1?'Убрано':'Добавлено ❤️');}
function cDec(id){const e=cart.filter(i=>i.id===id);if(!e.length)return;const l=e[e.length-1];l.qty--;if(l.qty<=0)cart.splice(cart.indexOf(l),1);localStorage.setItem('moonera_cart',JSON.stringify(cart));updCart();renderProds();}

// ===== CART =====
function updCart(){const t=cart.reduce((s,i)=>s+i.qty,0);const b=document.getElementById('cbadge');b.textContent=t;b.classList.toggle('on',t>0);}
function openCart(){renderCartList();document.getElementById('cartOv').classList.add('on');document.getElementById('cartSh').classList.add('on');document.body.style.overflow='hidden';}
function closeCart(){document.getElementById('cartOv').classList.remove('on');document.getElementById('cartSh').classList.remove('on');document.body.style.overflow='';}
function renderCartList(){
  const el=document.getElementById('cartItems'),ft=document.getElementById('cartFooter');
  if(!cart.length){el.innerHTML='<div class="cempty"><div style="font-size:48px;margin-bottom:12px">🛒</div>Корзина пуста</div>';ft.style.display='none';return;}
  el.innerHTML=cart.map((it,idx)=>`<div class="ci">
    <div class="ci-img">${it.image?`<img src="${it.image}">`:(it.emoji||'👕')}</div>
    <div class="ci-info"><div class="ci-name">${it.name}</div><div class="ci-size">${it.size}</div>
      <div class="qctrl"><button class="qbtn" onclick="chQ(${idx},-1)">−</button><div class="qnum">${it.qty}</div><button class="qbtn" onclick="chQ(${idx},1)">+</button></div>
    </div><div class="ci-price">${fmt(it.price*it.qty)}</div></div>`).join('');
  document.getElementById('cartTotal').textContent=fmt(cart.reduce((s,i)=>s+i.price*i.qty,0));ft.style.display='block';
}
function chQ(idx,d){cart[idx].qty+=d;if(cart[idx].qty<=0)cart.splice(idx,1);localStorage.setItem('moonera_cart',JSON.stringify(cart));updCart();renderCartList();renderProds();}

// ===== ORDER =====
function fmtP(input){let d=input.value.replace(/\D/g,'');if(d.startsWith('998'))d=d.slice(3);else if(d.startsWith('8'))d=d.slice(1);d=d.slice(0,9);let f='+998';if(d.length>0)f+=' '+d.slice(0,2);if(d.length>2)f+=' '+d.slice(2,5);if(d.length>5)f+=' '+d.slice(5,7);if(d.length>7)f+=' '+d.slice(7,9);input.value=f;}
function pdKD(e,i){if(e.key==='Backspace'&&i.value==='+998')e.preventDefault();}
function openOrder(){
  document.getElementById('orderTotal').textContent=fmt(cart.reduce((s,i)=>s+i.price*i.qty,0));
  document.getElementById('orderForm').style.display='block';document.getElementById('succEl').classList.remove('on');
  const p=gProfile();if(p){document.getElementById('fn').value=p.name||'';if(!document.getElementById('fp').value)document.getElementById('fp').value=p.phone||'+998';}
  else if(!document.getElementById('fp').value)document.getElementById('fp').value='+998';
  document.getElementById('orderOv').classList.add('on');document.getElementById('orderSh').classList.add('on');closeCart();
}
function closeOrder(){document.getElementById('orderOv').classList.remove('on');document.getElementById('orderSh').classList.remove('on');document.body.style.overflow='';}
function submitOrder(){
  const name=document.getElementById('fn').value.trim(),phone=document.getElementById('fp').value.trim(),addr=document.getElementById('fa').value.trim();
  let ok=true;
  [{id:'fn',v:name},{id:'fp',v:phone,min:15},{id:'fa',v:addr}].forEach(f=>{const el=document.getElementById(f.id);el.classList.remove('err');if(!f.v||(f.min&&f.v.length<f.min)){el.classList.add('err');ok=false;}});
  if(!ok){toast('Заполни все обязательные поля!');return;}
  const orderId='ord_'+Date.now();
  const order={id:orderId,date:new Date().toISOString(),name,phone,address:addr,tg:document.getElementById('ftg').value.trim(),items:[...cart],total:cart.reduce((s,i)=>s+i.price*i.qty,0),status:'В обработке',clientId:getClientId()};
  // Save to Firebase
  db.collection('orders').doc(orderId).set(order)
    .then(()=>{console.log('Order saved');})
    .catch(e=>console.warn('Order save error:',e));
  localStorage.setItem('moonera_my_order_id',orderId);
  localStorage.setItem('moonera_order_cache_'+orderId,JSON.stringify(order));
  cart=[];localStorage.setItem('moonera_cart',JSON.stringify(cart));updCart();
  document.getElementById('orderForm').style.display='none';document.getElementById('succEl').classList.add('on');
  document.getElementById('ordBtn').classList.add('on');
  startOrderListener();
}
function closeSucc(){closeOrder();}

// ===== STATUS =====
function chkOrdBtn(){const o=getMyOrder();document.getElementById('ordBtn').classList.toggle('on',!!o&&o.status!=='Выполнен');}
function openStatus(){
  const o=getMyOrder();if(!o)return;
  document.getElementById('statInfo').innerHTML=`Заказ <b>#${o.id.slice(-6)}</b> · ${new Date(o.date).toLocaleDateString('ru-RU')} · <b style="color:var(--g1)">${o.status}</b>`;
  const ci=STEPS.findIndex(s=>s.key===o.status);
  document.getElementById('statSteps').innerHTML=STEPS.map((s,i)=>{const cls=i<ci?'done':i===ci?'active':'pend';return `<div class="ostep ${cls}"><div class="sico">${i<ci?'✓':s.icon}</div><div class="sinfo"><div class="stitle">${s.title}</div><div class="ssub">${s.sub}</div></div></div>`;}).join('');
  const rs=document.getElementById('revSec'),done=localStorage.getItem('moonera_reviewed_'+o.id);
  if(o.status==='Выполнен'){rs.style.display='block';if(done){document.getElementById('revForm').style.display='none';document.getElementById('revDone').style.display='block';}else{document.getElementById('revForm').style.display='block';document.getElementById('revDone').style.display='none';revSent=false;}}else rs.style.display='none';
  document.getElementById('statOv').classList.add('on');document.getElementById('statSh').classList.add('on');document.body.style.overflow='hidden';
}
function closeStat(){document.getElementById('statOv').classList.remove('on');document.getElementById('statSh').classList.remove('on');document.body.style.overflow='';const o=getMyOrder();if(o&&o.status==='Выполнен')document.getElementById('ordBtn').classList.remove('on');}

// ===== REVIEW =====
function setR(n){revRating=n;document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('on',i<n));}
function submitRev(){
  if(revSent)return;if(!revRating){toast('Поставьте оценку!');return;}
  const o=getMyOrder();if(!o)return;revSent=true;
  db.collection('reviews').add({orderId:o.id,rating:revRating,text:document.getElementById('revText').value.trim(),date:new Date().toISOString(),clientId:getClientId()}).catch(console.warn);
  localStorage.setItem('moonera_reviewed_'+o.id,'1');
  document.getElementById('revForm').style.display='none';document.getElementById('revDone').style.display='block';
  setTimeout(()=>closeStat(),2000);
}

// ===== SUPPORT NOTIF =====
function chkSupportNotif(){
  const msgs=JSON.parse(localStorage.getItem('moonera_support_msgs')||'[]');
  const has=msgs.some(m=>m.from==='admin'&&!m.clientRead);
  document.getElementById('profNotif').classList.toggle('on',has);
}

// ===== PROFILE =====
function showProfilePage(){
  const p=gProfile();
  const back=`<div style="padding:16px 20px 0;display:flex;align-items:center;gap:10px"><button onclick="goShop()" style="width:36px;height:36px;border-radius:50%;background:var(--sf2);border:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--tx)">←</button><span style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700">Профиль</span></div>`;
  if(!p){document.getElementById('profContent').innerHTML=back+`<div style="padding:20px"><label class="fl">Имя</label><input class="fi" id="prof-name" placeholder="Твоё имя" style="margin-bottom:14px"><label class="fl">Телефон</label><input class="fi" id="prof-phone" placeholder="+998 90 123 45 67" type="tel" maxlength="17" oninput="fmtP(this)" onkeydown="pdKD(event,this)" style="margin-bottom:24px"><button class="gbtnf" style="margin-bottom:0" onclick="saveProfile()">Сохранить</button></div>`;return;}
  const photo=localStorage.getItem('moonera_client_photo');
  const msgs=JSON.parse(localStorage.getItem('moonera_support_msgs')||'[]');
  const hasNew=msgs.some(m=>m.from==='admin'&&!m.clientRead);
  document.getElementById('profContent').innerHTML=`${back}
    <div class="prof-header">
      <div class="prof-avatar-wrap"><input type="file" accept="image/*" onchange="uploadPhoto(event)"><div class="prof-avatar">${photo?`<img src="${photo}">`:(p.name[0].toUpperCase())}</div><div class="prof-avatar-edit">📷</div></div>
      <div class="prof-name">${p.name}</div><div class="prof-phone">${p.phone}</div>
    </div>
    <div class="pmenu-item" onclick="showFavs()"><div class="pmenu-icon" style="background:rgba(239,68,68,0.15)">❤️</div><div><div class="pmenu-title">Избранное</div><div class="pmenu-sub">${gFavs().length} товаров</div></div><span style="color:var(--tx2);margin-left:auto">›</span></div>
    <div class="pmenu-item" onclick="showOrders()"><div class="pmenu-icon" style="background:rgba(74,222,128,0.15)">📦</div><div><div class="pmenu-title">История заказов</div></div><span style="color:var(--tx2);margin-left:auto">›</span></div>
    <div class="pmenu-item" onclick="showMyRevs()"><div class="pmenu-icon" style="background:rgba(251,191,36,0.15)">⭐</div><div><div class="pmenu-title">Мои отзывы</div></div><span style="color:var(--tx2);margin-left:auto">›</span></div>
    <div class="pmenu-item" onclick="showSupport()"><div class="pmenu-icon" style="background:rgba(139,92,246,0.15);position:relative">💬${hasNew?'<span style="position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:#ef4444"></span>':''}</div><div><div class="pmenu-title">Поддержка${hasNew?' <span style="background:#ef4444;color:#fff;font-size:10px;padding:2px 7px;border-radius:50px">новое</span>':''}</div></div><span style="color:var(--tx2);margin-left:auto">›</span></div>
    <div style="padding:20px"><button style="width:100%;padding:14px;border-radius:var(--rb);background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer" onclick="logoutProf()">Выйти</button></div>`;
}
function saveProfile(){const name=document.getElementById('prof-name').value.trim(),phone=document.getElementById('prof-phone').value.trim();if(!name||phone.length<15){toast('Заполни имя и телефон');return;}svProfile({name,phone});showProfilePage();}
function logoutProf(){localStorage.removeItem('moonera_profile');showProfilePage();}
function uploadPhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{localStorage.setItem('moonera_client_photo',ev.target.result);showProfilePage();toast('Фото обновлено ✓');};r.readAsDataURL(f);}
function bkHdr(title){return `<div style="padding:16px 20px 0;display:flex;align-items:center;gap:10px;margin-bottom:4px"><button onclick="showProfilePage()" style="width:36px;height:36px;border-radius:50%;background:var(--sf2);border:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--tx)">←</button><span style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700">${title}</span></div>`;}
function statCls(s){return s==='В обработке'?'stat-proc':s==='Передан курьеру'?'stat-ship':s==='Выполнен'?'stat-done':'stat-cancel';}

function showFavs(){
  const favs=gFavs(),prods=gP().filter(p=>favs.includes(p.id));
  document.getElementById('profContent').innerHTML=bkHdr('❤️ Избранное')+`<div class="prof-section">
    ${prods.length?`<div class="prof-fav-grid">${prods.map(p=>{const img=(p.images&&p.images[0])||p.image;return `<div class="fav-card" onclick="openDet(${p.id})"><div class="fav-img">${img?`<img src="${img}">`:(p.emoji||'👕')}</div><div class="fav-name">${p.name}</div><div class="fav-price">${fmt(p.price)}</div><button onclick="event.stopPropagation();removeFav(${p.id})" style="width:100%;padding:6px;background:rgba(239,68,68,0.1);border:none;border-top:1px solid var(--bd);color:#f87171;font-size:12px;font-weight:600;cursor:pointer">✕ Убрать</button></div>`;}).join('')}</div>`:`<div class="prof-empty">Нет избранных</div>`}
  </div>`;
}
function removeFav(id){let f=gFavs();f=f.filter(x=>x!==id);svFavs(f);renderProds();showFavs();}

function showOrders(){
  const myPhone=gProfile()?.phone;
  // Load orders from Firebase for this client
  db.collection('orders').where('phone','==',myPhone||'').get().then(snap=>{
    const orders=snap.docs.map(d=>({id:d.id,...d.data()})).reverse();
    document.getElementById('profContent').innerHTML=bkHdr('📦 История заказов')+`<div class="prof-section">
      ${orders.length?orders.map(o=>`<div class="prof-order-card" onclick="viewOrd('${o.id}')">
        <div class="prof-order-head"><span class="prof-order-id">#${o.id.slice(-6)}</span><span class="stat-badge ${statCls(o.status)}">${o.status}</span></div>
        <div style="font-size:12px;color:var(--tx2);margin-bottom:6px">${new Date(o.date).toLocaleDateString('ru-RU')}</div>
        <div style="font-size:12px;color:var(--tx2)">${(o.items||[]).map(i=>i.name).join(', ')}</div>
        <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-top:6px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${fmt(o.total)}</div>
      </div>`).join(''):`<div class="prof-empty">Заказов пока нет</div>`}
    </div>`;
  }).catch(()=>{document.getElementById('profContent').innerHTML=bkHdr('📦 История заказов')+'<div class="prof-empty">Ошибка загрузки</div>';});
}
function viewOrd(id){localStorage.setItem('moonera_my_order_id',id);startOrderListener();openStatus();}

function showMyRevs(){
  db.collection('reviews').where('clientId','==',getClientId()).get().then(snap=>{
    const revs=snap.docs.map(d=>({id:d.id,...d.data()}));
    document.getElementById('profContent').innerHTML=bkHdr('⭐ Мои отзывы')+`<div class="prof-section">
      ${revs.length?revs.map(r=>`<div class="my-rev-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span>${'⭐'.repeat(r.rating)}</span><span style="font-size:11px;color:var(--tx2)">${new Date(r.date).toLocaleDateString('ru-RU')}</span></div>${r.text?`<div style="font-size:13px">${r.text}</div>`:''}</div>`).join(''):`<div class="prof-empty">Нет отзывов</div>`}
    </div>`;
  });
}

function showSupport(){
  // Mark admin messages as read
  const msgs=JSON.parse(localStorage.getItem('moonera_support_msgs')||'[]');
  msgs.forEach(m=>{if(m.from==='admin')m.clientRead=true;});
  localStorage.setItem('moonera_support_msgs',JSON.stringify(msgs));
  chkSupportNotif();
  renderSupportPage();
}
function renderSupportPage(){
  const msgs=JSON.parse(localStorage.getItem('moonera_support_msgs')||'[]');
  document.getElementById('profContent').innerHTML=bkHdr('💬 Поддержка')+`<div class="prof-section">
    <div id="sup-msgs" style="margin-bottom:16px;max-height:50vh;overflow-y:auto">${
      msgs.length?`<div style="overflow:hidden">${msgs.map(m=>`<div style="margin-bottom:12px;overflow:hidden"><div class="sup-msg ${m.from}">${m.text}</div><div class="sup-time" style="text-align:${m.from==='user'?'right':'left'}">${new Date(m.date).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}</div></div>`).join('')}</div>`
      :'<div class="prof-empty" style="padding:16px 0">Напишите нам</div>'}
    </div>
    <div style="display:flex;gap:8px">
      <input class="fi" id="sup-input" style="flex:1;margin:0" placeholder="Ваш вопрос..." type="text" onkeydown="if(event.key==='Enter')sendSup()">
      <button class="gbtnf" style="width:auto;padding:14px 18px;margin:0;flex-shrink:0" onclick="sendSup()">→</button>
    </div>
  </div>`;
  setTimeout(()=>{const e=document.getElementById('sup-msgs');if(e)e.scrollTop=e.scrollHeight;},50);
}
function sendSup(){
  const el=document.getElementById('sup-input');
  const text=el.value.trim();if(!text)return;
  const clientId=getClientId();
  const profile=gProfile();
  const msg={from:'user',text,date:new Date().toISOString(),clientId,clientName:profile?.name||'Клиент',clientPhone:profile?.phone||''};
  el.value='';
  // Save to Firebase
  db.collection('support').add(msg)
    .then(()=>{
      // Listener will update automatically
      toast('Сообщение отправлено ✓');
    })
    .catch(e=>{
      console.error('Support error:',e);
      toast('Ошибка отправки: '+e.code);
      // Still show locally
      const msgs=JSON.parse(localStorage.getItem('moonera_support_msgs')||'[]');
      msgs.push(msg);localStorage.setItem('moonera_support_msgs',JSON.stringify(msgs));
      renderSupportPage();
    });
  // Optimistic update
  const msgs=JSON.parse(localStorage.getItem('moonera_support_msgs')||'[]');
  msgs.push(msg);localStorage.setItem('moonera_support_msgs',JSON.stringify(msgs));
  renderSupportPage();
}

// ===== TOAST =====
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2500);}

// ===== INIT =====
(function(){
  const saved=localStorage.getItem('moonera_theme')||'dark';
  const h=document.documentElement,isLight=saved==='light';
  h.dataset.theme=saved;
  h.style.backgroundColor=isLight?'#f5f5f3':'#141414';
  document.body.style.backgroundColor=isLight?'#f5f5f3':'#141414';
  document.body.style.color=isLight?'#111111':'#f0f0f0';
  document.getElementById('metaTheme').content=isLight?'#f5f5f3':'#141414';
  document.getElementById('themeBtn').textContent=isLight?'☀️':'🌙';
})();
updCart();chkOrdBtn();chkSupportNotif();
loadFromFirebase();
startSupportListener();
setInterval(()=>chkSupportNotif(),5000);
</script>
</body>
</html>
